<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Struct - Formules (corrigé)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',sans-serif; background:#f0f2f5; height:100vh; display:flex; flex-direction:column; align-items:center; }
        .app { width:100%; max-width:700px; height:100vh; display:flex; flex-direction:column; background:#fff; }
        header { background:#1a2634; color:#fff; padding:12px 16px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:6px; }
        header h1 { font-size:1.1rem; }
        .header-actions button { background:#e74c3c; border:none; padding:4px 12px; border-radius:4px; color:#fff; cursor:pointer; font-size:0.8rem; }
        .upload-bar { background:#ecf0f1; padding:8px 16px; display:flex; gap:10px; align-items:center; border-bottom:1px solid #ddd; flex-wrap:wrap; }
        .upload-bar input[type="file"] { font-size:0.8rem; flex:1; }
        .upload-bar span { font-size:0.8rem; color:#27ae60; }
        #messages { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:10px; }
        .message { max-width:85%; padding:10px 14px; border-radius:12px; font-size:14px; line-height:1.6; word-wrap:break-word; }
        .message.user { align-self:flex-end; background:#2980b9; color:#fff; }
        .message.assistant { align-self:flex-start; background:#e8eaed; color:#222; }
        .message.system-note { align-self:center; color:#999; font-size:11px; font-style:italic; }
        .message.assistant .katex { font-size:1.1em; }
        .feedback { display:flex; gap:8px; margin-top:6px; justify-content:flex-end; }
        .feedback button { background:transparent; border:none; cursor:pointer; font-size:1.1rem; }
        #chat-form { display:flex; padding:10px; border-top:1px solid #ddd; gap:8px; }
        #user-input { flex:1; padding:10px; border:1px solid #ccc; border-radius:6px; resize:none; font-family:inherit; }
        #send-btn { padding:10px 18px; background:#27ae60; color:#fff; border:none; border-radius:6px; cursor:pointer; }
        .info { font-size:11px; color:#7f8c8d; padding:4px 16px; background:#fef9e7; border-top:1px solid #f1c40f; display:flex; justify-content:space-between; }
        .math-block { text-align:center; margin:8px 0; }
    </style>
</head>
<body>
<div class="app">
    <header>
        <h1>📐 AI Struct - Formules (corrigé)</h1>
        <div class="header-actions">
            <button id="suggest-btn" style="background:#3498db;">💡 Suggérer</button>
            <button id="reset-btn">🔄 Reset</button>
        </div>
    </header>
    <div class="upload-bar">
        <input type="file" id="pdf-upload" accept=".pdf">
        <span id="pdf-status">Aucun PDF chargé</span>
    </div>
    <div id="messages"></div>
    <div class="info">
        <span>🧠 Mémoire: <span id="memory-count">0</span> échanges</span>
        <span>📄 Chunks: <span id="chunk-count">0</span></span>
    </div>
    <form id="chat-form">
        <textarea id="user-input" rows="1" placeholder="Question technique (ex: calcul de flèche, formule de béton...)"></textarea>
        <button id="send-btn" type="submit">Envoyer</button>
    </form>
</div>

<script>
    // ========== CONFIG ==========
    const GROQ_API_KEY = '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';
    const STORAGE_KEY = 'ai_struct_math_memory_v2';

    // ========== STORAGE ==========
    let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
        conversations: [],
        chunks: [],
        preferences: { style: 'détaillé' }
    };

    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        document.getElementById('memory-count').textContent = data.conversations.length;
        document.getElementById('chunk-count').textContent = data.chunks.length;
    }

    // ========== FONCTION DE PRÉ‑TRAITEMENT POUR ENCADRER LE LATEX ==========
    function autoWrapLatex(text) {
        // 1. Protéger ce qui est déjà entre \(...\) ou $$...$$ (on les remplace temporairement par des marqueurs)
        const protected = [];
        let index = 0;
        // Remplacer les blocs $$...$$ par des marqueurs
        text = text.replace(/\$\$(.*?)\$\$/gs, (match, content) => {
            protected.push({ type: 'display', content: match });
            return `<<<PROTECTED_${protected.length-1}>>>`;
        });
        // Remplacer les \(...\) par des marqueurs
        text = text.replace(/\\\((.*?)\\\)/gs, (match, content) => {
            protected.push({ type: 'inline', content: match });
            return `<<<PROTECTED_${protected.length-1}>>>`;
        });

        // 2. Maintenant, chercher les commandes LaTeX non protégées
        // On va rechercher les motifs courants : \frac, \sqrt, \sum, \int, \alpha, etc.
        // On utilise une regex pour capturer les commandes avec leurs arguments entre accolades.
        // Pour simplifier, on va chercher \frac{...}{...} et \sqrt{...} et les remplacer par \(...\)
        // On peut aussi chercher des commandes simples comme \alpha, \beta, etc. (sans accolades) et les encadrer.
        // On va procéder par étapes pour les plus courants.

        // 2a. Remplacer \frac{...}{...} par \(\frac{...}{...}\)
        text = text.replace(/\\frac\{([^}]*)\}\{([^}]*)\}/g, (match, num, den) => {
            return `\\(\\frac{${num}}{${den}}\\)`;
        });

        // 2b. Remplacer \sqrt{...} par \(\sqrt{...}\)
        text = text.replace(/\\sqrt\{([^}]*)\}/g, (match, content) => {
            return `\\(\\sqrt{${content}}\\)`;
        });

        // 2c. Remplacer \sum, \int, \prod seuls ou avec limites \sum_{...}^{...}
        text = text.replace(/\\sum(?:\_\{([^}]*)\})?(?:\^\{([^}]*)\})?/g, (match, sub, sup) => {
            let s = '\\sum';
            if (sub) s += `_{${sub}}`;
            if (sup) s += `^{${sup}}`;
            return `\\(${s}\\)`;
        });
        text = text.replace(/\\int(?:\_\{([^}]*)\})?(?:\^\{([^}]*)\})?/g, (match, sub, sup) => {
            let s = '\\int';
            if (sub) s += `_{${sub}}`;
            if (sup) s += `^{${sup}}`;
            return `\\(${s}\\)`;
        });

        // 2d. Remplacer les symboles grecs courants (s'ils ne sont pas déjà dans un bloc)
        // On les encadre aussi, mais attention à ne pas dupliquer.
        // On va traiter les cas où ils apparaissent seuls ou avec des indices.
        text = text.replace(/(\\[a-zA-Z]+)(?:\_\{([^}]*)\})?(?:\^\{([^}]*)\})?/g, (match, cmd, sub, sup) => {
            // Vérifier si c'est un symbole grec ou une commande connue
            const greek = ['alpha','beta','gamma','delta','epsilon','zeta','eta','theta','iota','kappa','lambda','mu','nu','xi','omicron','pi','rho','sigma','tau','upsilon','phi','chi','psi','omega'];
            const cmdName = cmd.slice(1);
            if (greek.includes(cmdName) || ['sigma','tau','phi','psi','omega','Gamma','Delta','Theta','Lambda','Xi','Pi','Sigma','Phi','Psi','Omega'].includes(cmdName)) {
                let s = cmd;
                if (sub) s += `_{${sub}}`;
                if (sup) s += `^{${sup}}`;
                // On l'encadre seulement s'il n'est pas déjà dans un délimiteur
                // Comme on a protégé ceux déjà délimités, on est sûr qu'il est nu
                return `\\(${s}\\)`;
            }
            // Pour les autres, on laisse
            return match;
        });

        // 3. Restaurer les blocs protégés
        text = text.replace(/<<<PROTECTED_(\d+)>>>/g, (match, idx) => {
            return protected[parseInt(idx)].content;
        });

        return text;
    }

    // ========== RENDU FINAL AVEC KATEX ==========
    function renderMathToHTML(text) {
        // 1. Prétraiter pour encadrer le LaTeX nu
        text = autoWrapLatex(text);

        // 2. Maintenant, faire le rendu KaTeX normal
        // Blocs $$...$$
        text = text.replace(/\$\$(.*?)\$\$/gs, (match, math) => {
            try {
                return `<div class="math-block">${katex.renderToString(math, { displayMode: true, throwOnError: false })}</div>`;
            } catch(e) {
                return match;
            }
        });

        // Inline \(...\)
        text = text.replace(/\\\((.*?)\\\)/gs, (match, math) => {
            try {
                return katex.renderToString(math, { displayMode: false, throwOnError: false });
            } catch(e) {
                return match;
            }
        });

        return text;
    }

    // ========== RECHERCHE DANS LES CHUNKS ==========
    function findRelevantChunks(query, topN=3) {
        if (data.chunks.length === 0) return [];
        const words = query.toLowerCase().split(/\s+/);
        return data.chunks
            .map(c => ({ ...c, score: words.filter(w => c.text.toLowerCase().includes(w)).length }))
            .sort((a,b) => b.score - a.score)
            .slice(0, topN);
    }

    // ========== APPEL GROQ ==========
    async function askGroq(userQuestion, contextChunks) {
        const systemPrompt = `Tu es l'agent IA d'Ingénierie Travaux (Aymane Abidine), expert en génie civil.
        Tu réponds en français, avec clarté et pédagogie.
        RÈGLE ABSOLUE POUR LES FORMULES :
        - Pour toute expression mathématique, fraction, équation, utilise IMPÉRATIVEMENT la syntaxe LaTeX.
        - Utilise les délimiteurs \\( ... \\) pour les formules dans le texte, et $$ ... $$ pour les équations sur une ligne séparée.
        - Exemple : \\( \\frac{1}{2} \\) ou $$ \\sigma = \\frac{F}{A} $$.
        - Pour les racines : \\( \\sqrt{x} \\), les exposants : \\( x^2 \\), les symboles grecs : \\( \\alpha, \\beta, \\sigma \\).

        ${data.preferences.style === 'concis' ? 'Sois concis, va à l\'essentiel.' : 'Donne des détails techniques précis.'}
        
        Contexte extrait des documents :
        ${contextChunks.map(c => c.text).join('\n---\n')}
        
        Réponds à la question en t'appuyant sur ce contexte.`;

        const messages = [
            { role: 'system', content: systemPrompt },
            ...data.conversations.slice(-8).map(c => ({ role: c.role, content: c.content })),
            { role: 'user', content: userQuestion }
        ];

        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + GROQ_API_KEY },
                body: JSON.stringify({
                    model: 'llama-3.3-70b-versatile',
                    messages: messages,
                    temperature: 0.6
                })
            });
            const json = await response.json();
            return json.choices[0].message.content;
        } catch (err) {
            return "❌ Erreur de connexion Groq. Vérifiez votre clé API.";
        }
    }

    // ========== AFFICHAGE ==========
    const messagesEl = document.getElementById('messages');

    function renderMessage(role, content, withFeedback = false) {
        const div = document.createElement('div');
        div.className = 'message ' + role;
        
        if (role === 'assistant' || role === 'system-note') {
            div.innerHTML = renderMathToHTML(content);
        } else {
            div.textContent = content;
        }

        if (withFeedback && role === 'assistant') {
            const fb = document.createElement('div');
            fb.className = 'feedback';
            const up = document.createElement('button');
            up.textContent = '👍';
            up.onclick = () => { handleFeedback(true); };
            const down = document.createElement('button');
            down.textContent = '👎';
            down.onclick = () => { handleFeedback(false); };
            fb.append(up, down);
            div.appendChild(fb);
        }
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function handleFeedback(isPositive) {
        const last = data.conversations.filter(c => c.role === 'assistant').pop();
        if (last) {
            last.feedback = isPositive ? 'positive' : 'negative';
            if (!isPositive) {
                data.preferences.style = 'concis';
            } else {
                data.preferences.style = 'détaillé';
            }
            saveData();
            alert('Merci ! L\'IA adaptera son style.');
        }
    }

    // ========== ENVOI MESSAGE ==========
    async function sendMessage(text) {
        if (!text.trim()) return;
        data.conversations.push({ role: 'user', content: text });
        saveData();
        renderMessage('user', text);

        const relevant = findRelevantChunks(text, 3);
        const reply = await askGroq(text, relevant);

        const msg = { role: 'assistant', content: reply };
        data.conversations.push(msg);
        saveData();
        renderMessage('assistant', reply, true);

        // Initiative
        const userCount = data.conversations.filter(c => c.role === 'user').length;
        if (userCount % 3 === 0 && userCount > 0) {
            setTimeout(() => {
                const init = "💡 Puis-je vous proposer le calcul de la section d'acier selon l'Eurocode 2 ? Je peux vous donner la formule : $$ \\frac{N_{Ed}}{f_{yd}} $$.";
                data.conversations.push({ role: 'assistant', content: init });
                saveData();
                renderMessage('assistant', init, true);
            }, 1200);
        }
    }

    // ========== GESTION PDF ==========
    document.getElementById('pdf-upload').addEventListener('change', async function(e) {
        const file = e.target.files[0];
        if (!file) return;
        document.getElementById('pdf-status').textContent = '⏳ Lecture du PDF...';

        const reader = new FileReader();
        reader.onload = async function(ev) {
            const pdfData = new Uint8Array(ev.target.result);
            const pdf = await pdfjsLib.getDocument({ data: pdfData }).promise;
            let fullText = '';
            for (let i=1; i<=pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                const strings = content.items.map(item => item.str);
                fullText += strings.join(' ') + '\n';
            }
            const words = fullText.split(/\s+/);
            const chunkSize = 500;
            const chunks = [];
            for (let i=0; i<words.length; i+=chunkSize) {
                const chunk = words.slice(i, i+chunkSize).join(' ');
                chunks.push({ id: `c${chunks.length}`, text: chunk });
            }
            data.chunks = chunks;
            saveData();
            document.getElementById('pdf-status').textContent = `✅ ${chunks.length} chunks extraits (${pdf.numPages} pages)`;
            renderMessage('system-note', `📄 PDF chargé : ${chunks.length} morceaux prêts.`);
        };
        reader.readAsArrayBuffer(file);
    });

    // ========== UI EVENTS ==========
    document.getElementById('chat-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        input.value = '';
        await sendMessage(text);
    });

    document.getElementById('suggest-btn').onclick = () => {
        const sugg = "🔍 Je peux vous aider à vérifier la résistance d'une poutre. La contrainte normale est : $$ \\sigma = \\frac{M}{I} \\cdot y $$. Souhaitez-vous un exemple ?";
        data.conversations.push({ role: 'assistant', content: sugg });
        saveData();
        renderMessage('assistant', sugg, true);
    };

    document.getElementById('reset-btn').onclick = () => {
        if (confirm('Effacer toute la mémoire ?')) {
            localStorage.removeItem(STORAGE_KEY);
            location.reload();
        }
    };

    // ========== INIT ==========
    window.onload = () => {
        data.conversations.forEach(c => {
            if (c.role === 'system-note') renderMessage('system-note', c.content);
            else renderMessage(c.role, c.content, c.role === 'assistant');
        });
        saveData();
        if (data.conversations.length === 0) {
            const welcome = "Bonjour ! Je suis votre IA structure. Je maîtrise les formules scientifiques. Essayez : *Donne-moi la formule de la flèche pour une poutre bi-encastrée* ou uploadez un PDF !";
            data.conversations.push({ role: 'assistant', content: welcome });
            saveData();
            renderMessage('assistant', welcome, true);
        }
        document.getElementById('pdf-status').textContent = data.chunks.length ? `✅ ${data.chunks.length} chunks en mémoire` : 'Aucun PDF chargé';
    };
</script>
</body>
</html>
